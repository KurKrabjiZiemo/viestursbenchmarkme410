<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var theme = localStorage.getItem('appTheme');
        if (theme !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
